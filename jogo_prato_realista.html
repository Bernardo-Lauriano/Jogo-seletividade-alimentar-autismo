
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="frame">
  <div class="header-bg">
    <div class="title-banner"> O que eu quero comer? </div>
    <div class="alimentos-label">Toque no alimento para colocar no prato!</div>
    <div class="food-grid" id="foodGrid"></div>
  </div>

  <div class="prato-area">
    <span class="estrela" style="top:4%;left:4%;animation-delay:0s">⭐</span>
    <span class="estrela" style="top:6%;right:5%;animation-delay:0.6s">✨</span>
    <span class="estrela" style="bottom:12%;left:6%;animation-delay:1.1s">💫</span>
    <span class="estrela" style="bottom:10%;right:7%;animation-delay:0.4s">🌟</span>

    <div class="prato-container">
      <div class="prato-interna" id="pratoInterna">
        <div class="prato-vazio-txt" id="pratoVazio">🍽️<br>Escolha<br>um alimento!</div>
      </div>
    </div>

    <div class="bottom-row">
      <span class="animal"></span>
      <button class="btn-limpar" onclick="limparPrato()">🗑️ Limpar prato</button>
      <span class="animal"></span>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
